<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E41RL1GF7T"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-E41RL1GF7T');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taiwan Venue Hub | 台灣質感空間指南</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a18;
            --paper: #faf8f4;
            --accent: #c8642d;
            --accent-soft: #e8d9c8;
            --muted: #8a8478;
            --line: #e6e0d6;
        }
        * { box-sizing: border-box; }
        body {
            font-family: "Anthropic Sans", "Inter", "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--paper);
            color: var(--ink);
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .serif-disp { font-weight: 800; letter-spacing: -0.02em; }
        .fade-in { animation: fadeIn .5s ease both; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(12px);} to {opacity:1; transform:none;} }
        .stagger > * { animation: fadeIn .5s ease both; }
        .stagger > *:nth-child(2){animation-delay:.05s}
        .stagger > *:nth-child(3){animation-delay:.1s}
        .stagger > *:nth-child(4){animation-delay:.15s}
        .stagger > *:nth-child(5){animation-delay:.2s}
        .stagger > *:nth-child(6){animation-delay:.25s}
        .card-hover { transition: transform .3s cubic-bezier(.2,.8,.2,1), box-shadow .3s, border-color .3s; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 18px 40px -18px rgba(0,0,0,.25); border-color: var(--accent); }
        .drawer { transition: transform .4s cubic-bezier(.2,.8,.2,1); }
        .overlay { transition: opacity .3s; }
        ::-webkit-scrollbar { width: 9px; }
        ::-webkit-scrollbar-thumb { background: #d8d0c4; border-radius: 9px; }
        .pill { transition: all .2s; }
        .pill:hover { background: var(--ink); color: var(--paper); }
        .hero-grain { background-image: radial-gradient(var(--line) 1px, transparent 1px); background-size: 22px 22px; }
        .detail-prose h4 { font-weight:700; margin: 0 0 4px; color: var(--ink); }
        .detail-prose p { color: #4a463e; line-height: 1.7; margin: 0; }
    </style>
</head>
<body>

<!-- ===== TOP BAR ===== -->
<header class="sticky top-0 z-40 backdrop-blur bg-[rgba(250,248,244,.85)] border-b" style="border-color:var(--line)">
    <div class="max-w-6xl mx-auto px-5 h-16 flex items-center justify-between">
        <button onclick="goHome()" class="flex items-center gap-2 group">
            <span class="w-9 h-9 rounded-xl flex items-center justify-center text-white" style="background:var(--accent)">
                <i class="fa-solid fa-location-dot"></i>
            </span>
            <span class="serif-disp text-lg">Taiwan Venue Hub</span>
        </button>
        <button onclick="openNav()" class="w-10 h-10 rounded-xl border flex items-center justify-center hover:bg-black/5" style="border-color:var(--line)" aria-label="選單">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>
</header>

<!-- ===== BREADCRUMB ===== -->
<div id="breadcrumb" class="max-w-6xl mx-auto px-5 pt-5 text-sm hidden" style="color:var(--muted)"></div>

<main id="app" class="max-w-6xl mx-auto px-5 pb-24"></main>

<!-- ===== HAMBURGER NAV DRAWER ===== -->
<div id="navOverlay" onclick="closeNav()" class="overlay fixed inset-0 bg-black/40 z-40 opacity-0 pointer-events-none"></div>
<aside id="navDrawer" class="drawer fixed top-0 right-0 h-full w-[88%] max-w-sm bg-[var(--paper)] z-50 shadow-2xl translate-x-full overflow-y-auto">
    <div class="p-6">
        <div class="flex items-center justify-between mb-6">
            <h3 class="serif-disp text-xl">瀏覽選單</h3>
            <button onclick="closeNav()" class="w-9 h-9 rounded-lg hover:bg-black/5"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <p class="text-xs uppercase tracking-widest mb-2" style="color:var(--muted)">分類</p>
        <div class="space-y-2 mb-7">
            <button onclick="goCategory('mall')" class="w-full text-left px-4 py-3 rounded-xl border card-hover" style="border-color:var(--line)"><i class="fa-solid fa-bag-shopping mr-2" style="color:var(--accent)"></i>商場 · 購物中心 / 百貨</button>
            <button onclick="goCategory('cinema')" class="w-full text-left px-4 py-3 rounded-xl border card-hover" style="border-color:var(--line)"><i class="fa-solid fa-film mr-2" style="color:var(--accent)"></i>電影院 / 影城</button>
        </div>
        <p class="text-xs uppercase tracking-widest mb-2 mt-2" style="color:var(--muted)">資料分析</p>
        <div class="space-y-2 mb-7">
            <a href="ptt-food-analysis.html" class="w-full text-left px-4 py-3 rounded-xl border card-hover flex items-center" style="border-color:var(--line)"><i class="fa-solid fa-chart-bar mr-2" style="color:var(--accent)"></i>PTT Food 板分析報告</a>
        </div>
        <p class="text-xs uppercase tracking-widest mb-2" style="color:var(--muted)">連鎖業者一覽 · 查看旗下所有店</p>
        <div id="chainList" class="flex flex-wrap gap-2"></div>
    </div>
</aside>

<!-- ===== DETAIL PANEL ===== -->
<div id="detailOverlay" onclick="closeDetails()" class="overlay fixed inset-0 bg-black/50 z-40 opacity-0 pointer-events-none"></div>
<aside id="detailDrawer" class="drawer fixed top-0 right-0 h-full w-full max-w-2xl bg-[var(--paper)] z-50 shadow-2xl translate-x-full overflow-y-auto">
    <div id="detailContent" class="p-0"></div>
</aside>

<script src="venues.js"></script>
<script>
// ---------- helpers ----------
const $ = (s) => document.querySelector(s);
const app = $('#app');
const catMeta = {
    mall:   { label: '商場', sub: '購物中心 / 百貨公司', icon: 'fa-bag-shopping' },
    cinema: { label: '電影院', sub: '影城 / 戲院', icon: 'fa-film' },
};
let state = { view: 'home', category: null, region: null };

function cityVenues(category, cityCfg) {
    return venues.filter(v => v.category === category && cityCfg.match.includes(v.city));
}
function countForRegion(category, regionCfg) {
    return regionCfg.cities.reduce((n, c) => n + cityVenues(category, c).length, 0);
}

// ---------- views ----------
function goHome() {
    state = { view:'home', category:null, region:null };
    closeAllDrawers();
    setBreadcrumb([]);
    const totalMall = venues.filter(v=>v.category==='mall').length;
    const totalCine = venues.filter(v=>v.category==='cinema').length;
    app.innerHTML = `
      <section class="fade-in pt-10 pb-14 text-center hero-grain rounded-3xl mt-6 border" style="border-color:var(--line)">
        <p class="text-xs tracking-[.3em] uppercase mb-4" style="color:var(--muted)">Taiwan · Malls & Cinemas</p>
        <h1 class="serif-disp text-4xl md:text-6xl leading-tight px-4">探索台灣的<br><span style="color:var(--accent)">質感消費空間</span></h1>
        <p class="mt-5 text-base md:text-lg max-w-xl mx-auto px-6" style="color:#5a564d">收錄全台 ${venues.length} 處商場與影城，從北到南、本島到離島，依地區深入探索。</p>
      </section>
      <div class="grid md:grid-cols-2 gap-6 mt-10 stagger">
        ${['mall','cinema'].map(cat => `
          <button onclick="goCategory('${cat}')" class="card-hover group text-left bg-white rounded-3xl border p-8 md:p-10 relative overflow-hidden" style="border-color:var(--line)">
            <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-2xl text-white mb-6" style="background:var(--accent)"><i class="fa-solid ${catMeta[cat].icon}"></i></div>
            <h2 class="serif-disp text-3xl mb-1">${catMeta[cat].label}</h2>
            <p class="text-sm mb-6" style="color:var(--muted)">${catMeta[cat].sub}</p>
            <span class="inline-flex items-center gap-2 text-sm font-medium" style="color:var(--accent)">瀏覽 ${cat==='mall'?totalMall:totalCine} 處據點 <i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition"></i></span>
          </button>`).join('')}
      </div>`;
}

function goCategory(category) {
    state = { view:'region', category, region:null };
    closeAllDrawers();
    setBreadcrumb([['首頁', 'goHome()'], [catMeta[category].label, null]]);
    app.innerHTML = `
      <section class="fade-in pt-8">
        <h2 class="serif-disp text-3xl md:text-4xl mb-2"><i class="fa-solid ${catMeta[category].icon} mr-3" style="color:var(--accent)"></i>${catMeta[category].label}</h2>
        <p class="mb-8" style="color:var(--muted)">選擇地區，深入各縣市探索</p>
        <div class="space-y-8">
          ${regionConfig.map(r => `
            <div>
              <div class="flex items-baseline gap-3 mb-3">
                <h3 class="serif-disp text-xl">${r.name}</h3>
                <span class="text-xs" style="color:var(--muted)">${countForRegion(category, r)} 處</span>
              </div>
              <div class="flex flex-wrap gap-2.5">
                ${r.cities.map(c => {
                    const n = cityVenues(category, c).length;
                    return `<button onclick="goCity('${r.key}','${c.key}')" class="pill px-4 py-2 rounded-full border text-sm ${n? '' : 'opacity-60'}" style="border-color:var(--line)">${c.name}<span class="ml-1.5 text-xs" style="color:var(--accent)">${n||''}</span></button>`;
                }).join('')}
              </div>
            </div>`).join('')}
        </div>
      </section>`;
}

function goCity(regionKey, cityKey) {
    const region = regionConfig.find(r=>r.key===regionKey);
    const cityCfg = region.cities.find(c=>c.key===cityKey);
    const list = cityVenues(state.category, cityCfg);
    state.view = 'list';
    closeAllDrawers();
    setBreadcrumb([['首頁','goHome()'], [catMeta[state.category].label, `goCategory('${state.category}')`], [cityCfg.name, null]]);
    app.innerHTML = `
      <section class="fade-in pt-8">
        <h2 class="serif-disp text-3xl mb-1">${cityCfg.name} · ${catMeta[state.category].label}</h2>
        <p class="mb-8" style="color:var(--muted)">${list.length} 處據點</p>
        ${list.length ? `<div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5 stagger">${list.map(cardHTML).join('')}</div>`
          : `<div class="text-center py-24 rounded-3xl border" style="border-color:var(--line)">
               <i class="fa-regular fa-face-smile text-4xl mb-4" style="color:var(--accent-soft)"></i>
               <p class="text-lg">所選區域還沒有${catMeta[state.category].label}進駐</p>
               <p class="text-sm mt-2" style="color:var(--muted)">換個縣市看看，或回上一頁瀏覽其他地區。</p>
             </div>`}
      </section>`;
}

function cardHTML(v) {
    return `
      <button onclick="openDetails('${v.id}')" class="card-hover text-left bg-white rounded-2xl border overflow-hidden flex flex-col" style="border-color:var(--line)">
        <div class="p-5 flex-1">
          <div class="flex items-center gap-2 mb-3">
            <span class="text-[11px] px-2 py-0.5 rounded-full" style="background:var(--accent-soft);color:#7a4a22">${v.typeLabel}</span>
            ${v.video?'<span class="text-[11px] px-2 py-0.5 rounded-full bg-black text-white"><i class="fa-solid fa-play mr-1"></i>影片</span>':''}
          </div>
          <h3 class="font-bold text-lg leading-snug mb-2">${v.name}</h3>
          <p class="text-sm leading-relaxed" style="color:#5a564d">${v.shortDesc}</p>
        </div>
        <div class="px-5 py-3 border-t flex items-center justify-between text-xs" style="border-color:var(--line);color:var(--muted)">
          <span><i class="fa-solid fa-location-dot mr-1"></i>${v.address}</span>
          <i class="fa-solid fa-arrow-right" style="color:var(--accent)"></i>
        </div>
      </button>`;
}

// ---------- detail ----------
function openDetails(id) {
    const v = venues.find(x => x.id === id);
    if (!v) return;
    const d = v.details || {};
    const rows = [
        ['fa-calendar', '開幕時間', d.opened],
        ['fa-clock-rotate-left', '歷史沿革', d.history],
        ['fa-circle-info', '營運現況', d.status],
        ['fa-store', '主力 / 進駐店家', d.anchorStores],
        ['fa-building', '建築規模', d.building],
        ['fa-square-parking', '停車資訊', d.parking],
        ['fa-train-subway', '交通方式', d.transport],
        ['fa-arrow-trend-up', '未來規劃', d.future],
    ].filter(r => r[2]);
    const video = v.video ? `
        <div class="px-6 md:px-8 pb-2">
          <div class="rounded-2xl overflow-hidden border" style="border-color:var(--line)">
            <div style="position:relative;padding-top:56.25%">
              <iframe src="https://www.youtube.com/embed/${v.video}" title="${v.name} 影片" allowfullscreen
                style="position:absolute;inset:0;width:100%;height:100%" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
            </div>
          </div>
        </div>` : '';
    $('#detailContent').innerHTML = `
      <div class="sticky top-0 z-10 backdrop-blur bg-[rgba(250,248,244,.9)] border-b px-6 md:px-8 py-4 flex items-center justify-between" style="border-color:var(--line)">
        <span class="text-xs px-2.5 py-1 rounded-full" style="background:var(--accent-soft);color:#7a4a22">${v.typeLabel}</span>
        <button onclick="closeDetails()" class="w-9 h-9 rounded-lg hover:bg-black/5"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="px-6 md:px-8 pt-6 pb-3">
        <h2 class="serif-disp text-3xl mb-2">${v.name}</h2>
        <p class="text-base mb-1" style="color:#5a564d">${v.shortDesc}</p>
        <p class="text-sm mb-1" style="color:var(--muted)"><i class="fa-solid fa-location-dot mr-1.5"></i>${v.address}</p>
        ${v.chain?`<button onclick="showChain('${v.chain}')" class="text-sm mt-1" style="color:var(--accent)"><i class="fa-solid fa-layer-group mr-1"></i>查看「${v.chain}」全部分店</button>`:''}
      </div>
      ${video}
      <div class="px-6 md:px-8 py-4 space-y-5 detail-prose">
        ${rows.map(r => `
          <div class="flex gap-4">
            <div class="w-9 h-9 shrink-0 rounded-lg flex items-center justify-center" style="background:var(--accent-soft);color:#7a4a22"><i class="fa-solid ${r[0]}"></i></div>
            <div><h4>${r[1]}</h4><p>${r[2]}</p></div>
          </div>`).join('')}
      </div>
      <div class="h-10"></div>`;
    openDrawer('#detailDrawer', '#detailOverlay');
}

// ---------- chain browsing ----------
function buildChainList() {
    const chains = [...new Set(venues.filter(v=>v.chain).map(v=>v.chain))].sort();
    $('#chainList').innerHTML = chains.map(c =>
        `<button onclick="showChain('${c}')" class="pill px-3 py-1.5 rounded-full border text-sm" style="border-color:var(--line)">${c}</button>`).join('');
}
function showChain(chain) {
    const list = venues.filter(v => v.chain === chain);
    state.view = 'list';
    closeAllDrawers();
    setBreadcrumb([['首頁','goHome()'], [`連鎖：${chain}`, null]]);
    app.innerHTML = `
      <section class="fade-in pt-8">
        <h2 class="serif-disp text-3xl mb-1"><i class="fa-solid fa-layer-group mr-2" style="color:var(--accent)"></i>${chain}</h2>
        <p class="mb-8" style="color:var(--muted)">旗下 ${list.length} 處據點</p>
        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5 stagger">${list.map(cardHTML).join('')}</div>
      </section>`;
}

// ---------- breadcrumb ----------
function setBreadcrumb(parts) {
    const bc = $('#breadcrumb');
    if (!parts.length) { bc.classList.add('hidden'); return; }
    bc.classList.remove('hidden');
    bc.innerHTML = parts.map((p,i) => {
        const sep = i < parts.length-1 ? ' <i class="fa-solid fa-angle-right text-xs mx-1 opacity-50"></i> ' : '';
        return (p[1] ? `<button onclick="${p[1]}" class="hover:underline" style="color:var(--accent)">${p[0]}</button>` : `<span style="color:var(--ink)">${p[0]}</span>`) + sep;
    }).join('');
}

// ---------- drawers ----------
function openDrawer(drawer, overlay) {
    $(drawer).classList.remove('translate-x-full');
    const o = $(overlay); o.classList.remove('opacity-0','pointer-events-none');
    document.body.style.overflow = 'hidden';
}
function closeDrawer(drawer, overlay) {
    $(drawer).classList.add('translate-x-full');
    const o = $(overlay); o.classList.add('opacity-0','pointer-events-none');
    document.body.style.overflow = '';
}
function openNav(){ buildChainList(); openDrawer('#navDrawer','#navOverlay'); }
function closeNav(){ closeDrawer('#navDrawer','#navOverlay'); }
function closeDetails(){ closeDrawer('#detailDrawer','#detailOverlay'); }
function closeAllDrawers(){ closeNav(); closeDetails(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAllDrawers(); });

// ---------- init ----------
goHome();
</script>
</body>
</html>
